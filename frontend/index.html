<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #555;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 16px;
            line-height: 1.6;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #444;
        }

        textarea::placeholder {
            color: #3a3a3a;
        }

        button {
            margin-top: 12px;
            padding: 10px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #a0a0a0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            border-color: #555;
            color: #e8e8e8;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* reflection card — hidden until we have a response */
        .reflection {
            display: none;
            margin-top: 40px;
            padding: 24px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 8px;
        }

        .reflection.visible {
            display: block;
        }

        .reflection-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 16px;
        }

        .reflection-text {
            font-size: 15px;
            line-height: 1.8;
            color: #c8c8c8;
        }

        .original-entry {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1e1e1e;
            font-size: 13px;
            color: #444;
            line-height: 1.7;
        }

        .error {
            margin-top: 16px;
            padding: 12px 16px;
            background: #1a0f0f;
            border: 1px solid #3a1a1a;
            border-radius: 6px;
            color: #cc6666;
            font-size: 14px;
            display: none;
        }

        .error.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>mira</h1>
        <p class="subtitle">write what's on your mind. mira will reflect it back.</p>

        <textarea id="entry-input" placeholder="what's on your mind today..."></textarea>

        <button id="submit-btn" onclick="submitEntry()">reflect</button>

        <div class="error" id="error-box"></div>

        <div class="reflection" id="reflection-box">
            <div class="reflection-label">mira</div>
            <div class="reflection-text" id="reflection-text"></div>
            <div class="original-entry" id="original-entry"></div>
        </div>
    </div>

    <script>
        async function submitEntry() {
            const input = document.getElementById("entry-input");
            const btn = document.getElementById("submit-btn");
            const reflectionBox = document.getElementById("reflection-box");
            const reflectionText = document.getElementById("reflection-text");
            const originalEntry = document.getElementById("original-entry");
            const errorBox = document.getElementById("error-box");

            const text = input.value.trim();

            // basic client-side validation before even hitting the server
            if (!text) {
                showError("write something first.");
                return;
            }

            // disable the button and show loading state while waiting
            btn.disabled = true;
            btn.textContent = "reflecting...";
            reflectionBox.classList.remove("visible");
            errorBox.classList.remove("visible");

            try {
                // fetch() sends an HTTP request from the browser to our FastAPI backend.
                // "POST /entries" matches the route we defined in routes/entries.py.
                // we send JSON in the body — FastAPI will parse it as EntryCreate.
                const response = await fetch("/entries/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    // response.ok is true for 2xx status codes.
                    // if FastAPI returned a 422 (validation error) or 500 (server error),
                    // we end up here.
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "something went wrong");
                }

                // parse the JSON response body into a JavaScript object.
                // this matches the shape of EntryResponse from schemas.py.
                const data = await response.json();

                // render the reflection
                reflectionText.textContent = data.reflection || "mira couldn't reflect on this entry — but it's saved.";
                originalEntry.textContent = `"${data.text}"`;
                reflectionBox.classList.add("visible");

                // clear the textarea after successful submission
                input.value = "";

            } catch (err) {
                showError(err.message);
            } finally {
                // finally runs whether the request succeeded or failed.
                // always restore the button to its original state.
                btn.disabled = false;
                btn.textContent = "reflect";
            }
        }

        function showError(message) {
            const errorBox = document.getElementById("error-box");
            errorBox.textContent = message;
            errorBox.classList.add("visible");
        }

        // allow submitting with Ctrl+Enter so you don't have to reach for the mouse
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("entry-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
                    submitEntry();
                }
            });
        });
    </script>
</body>

</html>
