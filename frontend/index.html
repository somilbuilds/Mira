<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #a0a0a0;
        }

        .subtitle {
            font-size: 13px;
            color: #3a3a3a;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1e1e1e;
            margin-bottom: 32px;
        }

        .tab {
            padding: 8px 20px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            background: none;
            transition: all 0.2s;
            border-radius: 0;
        }

        .tab:hover {
            color: #888;
        }

        .tab.active {
            color: #c8c8c8;
            border-bottom-color: #555;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 15px;
            line-height: 1.7;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #383838;
        }

        textarea::placeholder {
            color: #2a2a2a;
        }

        button.primary {
            margin-top: 12px;
            padding: 9px 22px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.primary:hover {
            border-color: #444;
            color: #e8e8e8;
        }

        button.primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .reflection {
            display: none;
            margin-top: 28px;
            padding: 22px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
        }

        .reflection.visible {
            display: block;
        }

        .reflection-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #333;
            margin-bottom: 14px;
        }

        .reflection-text {
            font-size: 15px;
            line-height: 1.85;
            color: #b8b8b8;
        }

        .original-entry {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #1a1a1a;
            font-size: 13px;
            color: #333;
            line-height: 1.7;
            font-style: italic;
        }

        .error {
            margin-top: 12px;
            padding: 11px 15px;
            background: #1a0f0f;
            border: 1px solid #2e1515;
            border-radius: 6px;
            color: #b05555;
            font-size: 13px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        /* history */
        .history-meta {
            font-size: 12px;
            color: #383838;
            margin-bottom: 20px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry-card {
            background: #111;
            border: 1px solid #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .entry-card:hover {
            border-color: #252525;
        }

        .entry-card-header {
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .entry-preview {
            font-size: 14px;
            color: #666;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-date {
            font-size: 11px;
            color: #303030;
            white-space: nowrap;
        }

        .entry-body {
            display: none;
            padding: 0 18px 18px;
            border-top: 1px solid #1a1a1a;
        }

        .entry-body.open {
            display: block;
        }

        .entry-full-text {
            font-size: 14px;
            color: #666;
            line-height: 1.75;
            padding: 16px 0 14px;
            border-bottom: 1px solid #1a1a1a;
            font-style: italic;
        }

        .entry-reflection-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #2e2e2e;
            margin-top: 14px;
            margin-bottom: 10px;
        }

        .entry-reflection-text {
            font-size: 14px;
            color: #a0a0a0;
            line-height: 1.8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: #2e2e2e;
            font-size: 14px;
            line-height: 2;
        }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: #2e2e2e;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>mira</h1>
            <p class="subtitle">mind reflective agent</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('write', this)">write</button>
            <button class="tab" onclick="switchTab('history', this)">history</button>
        </div>

        <!-- WRITE -->
        <div class="panel active" id="panel-write">
            <textarea id="entry-input" placeholder="what's on your mind today..."></textarea>
            <button class="primary" id="submit-btn" onclick="submitEntry()">reflect</button>
            <div class="error" id="error-box"></div>
            <div class="reflection" id="reflection-box">
                <div class="reflection-label">mira</div>
                <div class="reflection-text" id="reflection-text"></div>
                <div class="original-entry" id="original-entry"></div>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="panel" id="panel-history">
            <div class="history-meta" id="history-count"></div>
            <div class="loading" id="history-loading">loading...</div>
            <div class="history-list" id="history-list"></div>
            <div class="empty-state" id="empty-state" style="display:none">
                nothing here yet.<br>write your first entry.
            </div>
        </div>

    </div>

    <script>
        function switchTab(name, el) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            el.classList.add("active");
            document.getElementById("panel-" + name).classList.add("active");
            if (name === "history") loadHistory();
        }

        async function submitEntry() {
            const input = document.getElementById("entry-input");
            const btn = document.getElementById("submit-btn");
            const reflectionBox = document.getElementById("reflection-box");
            const reflectionText = document.getElementById("reflection-text");
            const originalEntry = document.getElementById("original-entry");
            const errorBox = document.getElementById("error-box");

            const text = input.value.trim();
            if (!text) { showError("write something first."); return; }

            btn.disabled = true;
            btn.textContent = "reflecting...";
            reflectionBox.classList.remove("visible");
            errorBox.classList.remove("visible");

            try {
                const response = await fetch("/entries/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "something went wrong");
                }

                const data = await response.json();
                reflectionText.textContent = data.reflection || "mira couldn't reflect — but your entry is saved.";
                originalEntry.textContent = `"${data.text}"`;
                reflectionBox.classList.add("visible");
                input.value = "";

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "reflect";
            }
        }

        function showError(msg) {
            const box = document.getElementById("error-box");
            box.textContent = msg;
            box.classList.add("visible");
        }

        async function loadHistory() {
            const list = document.getElementById("history-list");
            const loading = document.getElementById("history-loading");
            const empty = document.getElementById("empty-state");
            const count = document.getElementById("history-count");

            list.innerHTML = "";
            loading.style.display = "block";
            empty.style.display = "none";
            count.textContent = "";

            try {
                const res = await fetch("/entries/");
                const entries = await res.json();

                loading.style.display = "none";

                if (entries.length === 0) {
                    empty.style.display = "block";
                    return;
                }

                count.textContent = `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`;

                entries.forEach(entry => {
                    const card = document.createElement("div");
                    card.className = "entry-card";
                    card.innerHTML = `
            <div class="entry-card-header" onclick="toggleEntry(this)">
              <div class="entry-preview">${esc(entry.text)}</div>
              <div class="entry-date">${fmt(entry.created_at)}</div>
            </div>
            <div class="entry-body">
              <div class="entry-full-text">${esc(entry.text)}</div>
              <div class="entry-reflection-label">mira</div>
              <div class="entry-reflection-text">${esc(entry.reflection || "no reflection saved.")}</div>
            </div>
          `;
                    list.appendChild(card);
                });

            } catch (e) {
                loading.textContent = "couldn't load entries.";
            }
        }

        function toggleEntry(header) {
            header.parentElement.querySelector(".entry-body").classList.toggle("open");
        }

        function fmt(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })
                + " · " + d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
        }

        function esc(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("entry-input").addEventListener("keydown", e => {
                if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitEntry();
            });
        });
    </script>
</body>

</html>
