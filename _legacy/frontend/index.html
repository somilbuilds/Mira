<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: #a0a0a0;
        }

        .subtitle {
            font-size: 13px;
            color: #3a3a3a;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1e1e1e;
            margin-bottom: 32px;
        }

        .tab {
            padding: 8px 20px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            background: none;
            transition: all 0.2s;
            border-radius: 0;
        }

        .tab:hover { color: #888; }

        .tab.active {
            color: #c8c8c8;
            border-bottom-color: #555;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        textarea {
            width: 100%;
            min-height: 160px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 15px;
            line-height: 1.7;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #383838; }
        textarea::placeholder { color: #2a2a2a; }

        button.primary {
            margin-top: 12px;
            padding: 9px 22px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.primary:hover {
            border-color: #444;
            color: #e8e8e8;
        }

        button.primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .reflection {
            display: none;
            margin-top: 28px;
            padding: 22px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
        }

        .reflection.visible { display: block; }

        .reflection-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #333;
            margin-bottom: 14px;
        }

        .reflection-text {
            font-size: 15px;
            line-height: 1.85;
            color: #b8b8b8;
        }

        .original-entry {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #1a1a1a;
            font-size: 13px;
            color: #333;
            line-height: 1.7;
            font-style: italic;
        }

        .open-chat-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 7px 18px;
            background: transparent;
            border: 1px solid #222;
            border-radius: 6px;
            color: #444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .open-chat-btn:hover {
            border-color: #383838;
            color: #888;
        }

        .mood-tag {
            display: inline-block;
            padding: 2px 10px;
            background: #161616;
            border: 1px solid #222;
            border-radius: 20px;
            font-size: 11px;
            color: #404040;
            margin-bottom: 14px;
            letter-spacing: 0.05em;
        }

        .error {
            margin-top: 12px;
            padding: 11px 15px;
            background: #1a0f0f;
            border: 1px solid #2e1515;
            border-radius: 6px;
            color: #b05555;
            font-size: 13px;
            display: none;
        }

        .error.visible { display: block; }

        /* ── history ── */
        .history-meta {
            font-size: 12px;
            color: #383838;
            margin-bottom: 20px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .entry-card {
            background: #111;
            border: 1px solid #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .entry-card:hover { border-color: #252525; }

        .entry-card-header {
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .entry-preview {
            font-size: 14px;
            color: #666;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .entry-mood {
            font-size: 10px;
            color: #303030;
            padding: 2px 8px;
            border: 1px solid #222;
            border-radius: 20px;
        }

        .entry-date {
            font-size: 11px;
            color: #303030;
            white-space: nowrap;
        }

        .entry-body {
            display: none;
            padding: 0 18px 18px;
            border-top: 1px solid #1a1a1a;
        }

        .entry-body.open { display: block; }

        .entry-full-text {
            font-size: 14px;
            color: #666;
            line-height: 1.75;
            padding: 16px 0 14px;
            border-bottom: 1px solid #1a1a1a;
            font-style: italic;
        }

        .entry-reflection-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #2e2e2e;
            margin-top: 14px;
            margin-bottom: 10px;
        }

        .entry-reflection-text {
            font-size: 14px;
            color: #a0a0a0;
            line-height: 1.8;
        }

        .entry-chat-btn {
            display: inline-block;
            margin-top: 14px;
            padding: 7px 18px;
            background: transparent;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            color: #383838;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .entry-chat-btn:hover {
            border-color: #333;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: #2e2e2e;
            font-size: 14px;
            line-height: 2;
        }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: #2e2e2e;
            font-size: 13px;
        }

        /* ── chat panel ── */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .chat-back {
            font-size: 12px;
            color: #333;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            transition: color 0.2s;
        }

        .chat-back:hover { color: #888; }

        .chat-entry-preview {
            font-size: 13px;
            color: #333;
            font-style: italic;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
            min-height: 200px;
        }

        .chat-message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.75;
        }

        .chat-message.user {
            background: #141414;
            border: 1px solid #222;
            color: #c8c8c8;
            align-self: flex-end;
        }

        .chat-message.mira {
            background: #111;
            border: 1px solid #1e1e1e;
            color: #a0a0a0;
            align-self: flex-start;
        }

        .chat-message .msg-label {
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #2e2e2e;
            margin-bottom: 8px;
        }

        .chat-message.mira .msg-label { color: #2e2e2e; }
        .chat-message.user .msg-label { color: #333; text-align: right; }

        .chat-input-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .chat-input {
            flex: 1;
            background: #141414;
            border: 1px solid #222;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 14px;
            line-height: 1.6;
            padding: 12px 14px;
            resize: none;
            outline: none;
            min-height: 46px;
            max-height: 140px;
            transition: border-color 0.2s;
            overflow-y: auto;
        }

        .chat-input:focus { border-color: #383838; }
        .chat-input:empty:before {
            content: attr(data-placeholder);
            color: #2a2a2a;
            pointer-events: none;
        }

        .chat-send {
            padding: 12px 18px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .chat-send:hover {
            border-color: #444;
            color: #e8e8e8;
        }

        .chat-send:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .chat-typing {
            display: none;
            align-self: flex-start;
            font-size: 12px;
            color: #333;
            padding: 8px 0;
        }

        .chat-typing.visible { display: block; }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>mira</h1>
            <p class="subtitle">mind reflective agent</p>
        </div>

        <div class="tabs" id="main-tabs">
            <button class="tab active" onclick="switchTab('write', this)">write</button>
            <button class="tab" onclick="switchTab('history', this)">history</button>
        </div>

        <!-- WRITE -->
        <div class="panel active" id="panel-write">
            <textarea id="entry-input" placeholder="what's on your mind today..."></textarea>
            <button class="primary" id="submit-btn" onclick="submitEntry()">reflect</button>
            <div class="error" id="error-box"></div>
            <div class="reflection" id="reflection-box">
                <div id="mood-display"></div>
                <div class="reflection-label">mira</div>
                <div class="reflection-text" id="reflection-text"></div>
                <div class="original-entry" id="original-entry"></div>
                <button class="open-chat-btn" id="open-chat-from-write" onclick="openChatFromWrite()">
                    continue the conversation →
                </button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="panel" id="panel-history">
            <div class="history-meta" id="history-count"></div>
            <div class="loading" id="history-loading">loading...</div>
            <div class="history-list" id="history-list"></div>
            <div class="empty-state" id="empty-state" style="display:none">
                nothing here yet.<br>write your first entry.
            </div>
        </div>

        <!-- CHAT -->
        <div class="panel" id="panel-chat">
            <div class="chat-header">
                <button class="chat-back" id="chat-back-btn">← back</button>
                <div class="chat-entry-preview" id="chat-entry-preview"></div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-typing" id="chat-typing">mira is thinking...</div>
            <div class="chat-input-row">
                <div
                    class="chat-input"
                    id="chat-input"
                    contenteditable="true"
                    data-placeholder="say something..."
                ></div>
                <button class="chat-send" id="chat-send-btn" onclick="sendChatMessage()">send</button>
            </div>
        </div>

    </div>

    <script>
        // ── state ────────────────────────────────────────────────────────────────
        let currentEntryId = null;
        let chatReturnTab = 'write';   // which tab to go back to

        // ── tab switching ────────────────────────────────────────────────────────
        function switchTab(name, el) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            if (el) el.classList.add("active");
            document.getElementById("panel-" + name).classList.add("active");
            if (name === "history") loadHistory();
        }

        // ── write panel ──────────────────────────────────────────────────────────
        async function submitEntry() {
            const input = document.getElementById("entry-input");
            const btn = document.getElementById("submit-btn");
            const reflectionBox = document.getElementById("reflection-box");
            const reflectionText = document.getElementById("reflection-text");
            const originalEntry = document.getElementById("original-entry");
            const errorBox = document.getElementById("error-box");
            const moodDisplay = document.getElementById("mood-display");

            const text = input.value.trim();
            if (!text) { showError("write something first."); return; }

            btn.disabled = true;
            btn.textContent = "reflecting...";
            reflectionBox.classList.remove("visible");
            errorBox.classList.remove("visible");

            try {
                const res = await fetch("/entries/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "something went wrong");
                }

                const data = await res.json();
                currentEntryId = data.id;

                moodDisplay.innerHTML = data.mood
                    ? `<div class="mood-tag">${esc(data.mood)}</div>`
                    : "";

                reflectionText.textContent = data.reflection || "mira couldn't reflect — but your entry is saved.";
                originalEntry.textContent = `"${data.text}"`;
                reflectionBox.classList.add("visible");
                input.value = "";

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "reflect";
            }
        }

        function showError(msg) {
            const box = document.getElementById("error-box");
            box.textContent = msg;
            box.classList.add("visible");
        }

        // ── open chat from write panel ────────────────────────────────────────────
        function openChatFromWrite() {
            if (!currentEntryId) return;
            chatReturnTab = 'write';
            openChat(currentEntryId);
        }

        // ── history panel ────────────────────────────────────────────────────────
        async function loadHistory() {
            const list = document.getElementById("history-list");
            const loading = document.getElementById("history-loading");
            const empty = document.getElementById("empty-state");
            const count = document.getElementById("history-count");

            list.innerHTML = "";
            loading.style.display = "block";
            empty.style.display = "none";
            count.textContent = "";

            try {
                const res = await fetch("/entries/");
                const entries = await res.json();

                loading.style.display = "none";

                if (entries.length === 0) {
                    empty.style.display = "block";
                    return;
                }

                count.textContent = `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`;

                // load each entry's full reflection lazily (only on expand)
                entries.forEach(entry => {
                    const card = document.createElement("div");
                    card.className = "entry-card";
                    const moodHtml = entry.mood
                        ? `<div class="entry-mood">${esc(entry.mood)}</div>`
                        : "";
                    card.innerHTML = `
                        <div class="entry-card-header" onclick="toggleEntry(this)">
                            <div class="entry-preview">${esc(entry.text)}</div>
                            <div class="entry-meta">
                                ${moodHtml}
                                <div class="entry-date">${fmt(entry.created_at)}</div>
                            </div>
                        </div>
                        <div class="entry-body" data-entry-id="${entry.id}" data-loaded="false">
                            <div class="entry-full-text">${esc(entry.text)}</div>
                            <div class="entry-reflection-label">mira</div>
                            <div class="entry-reflection-text">loading...</div>
                            <button class="entry-chat-btn" onclick="openChatFromHistory(${entry.id}, event)">
                                talk to mira about this →
                            </button>
                        </div>
                    `;
                    list.appendChild(card);
                });

            } catch (e) {
                loading.textContent = "couldn't load entries.";
            }
        }

        async function toggleEntry(header) {
            const body = header.parentElement.querySelector(".entry-body");
            body.classList.toggle("open");

            // lazy-load the full entry when first expanded
            if (body.classList.contains("open") && body.dataset.loaded === "false") {
                const entryId = body.dataset.entryId;
                try {
                    const res = await fetch(`/entries/${entryId}`);
                    const data = await res.json();
                    body.querySelector(".entry-reflection-text").textContent =
                        data.reflection || "no reflection saved.";
                    body.dataset.loaded = "true";
                } catch (e) {
                    body.querySelector(".entry-reflection-text").textContent = "couldn't load reflection.";
                }
            }
        }

        function openChatFromHistory(entryId, e) {
            e.stopPropagation();
            chatReturnTab = 'history';
            openChat(entryId);
        }

        // ── chat panel ───────────────────────────────────────────────────────────
        async function openChat(entryId) {
            currentEntryId = entryId;

            // set up back button
            document.getElementById("chat-back-btn").onclick = () => {
                // restore the tab we came from
                const tabs = document.querySelectorAll(".tab");
                tabs.forEach(t => {
                    if (t.textContent === chatReturnTab) t.click();
                });
                if (chatReturnTab === 'write') switchTab('write', tabs[0]);
                if (chatReturnTab === 'history') switchTab('history', tabs[1]);
            };

            // load entry preview
            try {
                const res = await fetch(`/entries/${entryId}`);
                const entry = await res.json();
                document.getElementById("chat-entry-preview").textContent = `"${entry.text}"`;
            } catch (e) {}

            // clear messages and load history
            document.getElementById("chat-messages").innerHTML = "";

            try {
                const res = await fetch(`/chat/${entryId}`);
                const data = await res.json();
                data.messages.forEach(m => appendMessage(m.role, m.content));
            } catch (e) {
                // no messages yet — show reflection as the first mira message
                try {
                    const res = await fetch(`/entries/${entryId}`);
                    const entry = await res.json();
                    if (entry.reflection) appendMessage("mira", entry.reflection);
                } catch (err) {}
            }

            // show the chat panel (bypass tab system — chat has no tab button)
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            document.getElementById("panel-chat").classList.add("active");

            // scroll to bottom
            scrollChat();

            // focus input
            document.getElementById("chat-input").focus();
        }

        async function sendChatMessage() {
            const input = document.getElementById("chat-input");
            const btn = document.getElementById("chat-send-btn");
            const typing = document.getElementById("chat-typing");

            const message = input.innerText.trim();
            if (!message || !currentEntryId) return;

            input.innerText = "";
            btn.disabled = true;
            typing.classList.add("visible");

            appendMessage("user", message);
            scrollChat();

            try {
                const res = await fetch("/chat/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ entry_id: currentEntryId, message })
                });

                if (!res.ok) throw new Error("something went wrong");

                const data = await res.json();
                appendMessage("mira", data.content);

            } catch (e) {
                appendMessage("mira", "something went quiet on my end. try again?");
            } finally {
                btn.disabled = false;
                typing.classList.remove("visible");
                scrollChat();
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById("chat-messages");
            const div = document.createElement("div");
            div.className = `chat-message ${role}`;
            div.innerHTML = `
                <div class="msg-label">${role === "mira" ? "mira" : "you"}</div>
                <div>${esc(content)}</div>
            `;
            container.appendChild(div);
        }

        function scrollChat() {
            const container = document.getElementById("chat-messages");
            container.scrollTop = container.scrollHeight;
        }

        // ── utilities ────────────────────────────────────────────────────────────
        function fmt(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })
                + " · " + d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
        }

        function esc(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/\n/g, "<br>");
        }

        // ── keyboard shortcuts ───────────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", () => {
            // Ctrl/Cmd+Enter to submit entry
            document.getElementById("entry-input").addEventListener("keydown", e => {
                if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitEntry();
            });

            // Enter (without shift) to send chat message
            document.getElementById("chat-input").addEventListener("keydown", e => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                }
            });
        });
    </script>
</body>

</html>
