<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mira - ReflectiveAI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .doodle {
      border: 3px solid black;
      border-radius: 8px;
      position: relative;
      transform: rotate(-0.5deg);
    }

    .doodle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      right: -2px;
      bottom: -2px;
      border: 3px solid black;
      border-radius: 8px;
      opacity: 0.6;
      transform: rotate(0.8deg);
      pointer-events: none;
    }

    .doodle2 { transform: rotate(0.7deg); }
    .doodle3 { transform: rotate(-1deg); }

    body { font-family: sans-serif; }
    .hand { font-family: 'Comic Sans MS', cursive; }
  </style>
</head>

<body class="bg-white text-black">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-6 border-b-2 border-black">
    <h1 class="text-4xl font-bold hand">MIRA</h1>
    <button class="border-2 border-black px-4 py-2">Login</button>
  </nav>

  <!-- Hero -->
  <section class="text-center mt-20 px-6">
    <div class="doodle inline-block p-6 doodle2">
      <h1 class="text-5xl font-bold hand">
        Your Thoughts,<br>Reflected Back
      </h1>
    </div>

    <p class="mt-8 text-lg max-w-xl mx-auto">
      Write freely. Let AI help you understand your emotions.
    </p>

    <!-- INPUT -->
    <textarea id="journalInput"
      class="mt-8 w-full max-w-xl border-2 border-black p-4"
      rows="5"
      placeholder="Write your thoughts..."></textarea>

    <!-- BUTTON -->
    <button onclick="sendEntry()" class="mt-6 doodle px-6 py-3 doodle3">
      Reflect →
    </button>

    <!-- RESPONSE -->
    <p id="responseText" class="mt-6 text-lg max-w-xl mx-auto"></p>
  </section>

  <script>
    async function sendEntry() {
      const text = document.getElementById("journalInput").value;

      const response = await fetch("http://127.0.0.1:8000/journal", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ entry: text })
      });

      const data = await response.json();

      document.getElementById("responseText").innerText = data.reflection;
    }
  </script>

</body>
</html>
